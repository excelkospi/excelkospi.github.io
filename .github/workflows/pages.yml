name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare static artifact
        run: |
          rm -rf .pages-artifact
          mkdir .pages-artifact
          rsync -a \
            --exclude ".git" \
            --exclude ".github" \
            --exclude ".pages-artifact" \
            --exclude ".DS_Store" \
            ./ .pages-artifact/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .pages-artifact

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
