<html lang="ko">
<head>

<title>excelkospi 텍스트 광고 제안서 | 일하면서 몰래보는 주식창</title>
<meta name="robots" content="noindex,nofollow" />
<meta name="theme-color" content="#107c41" />
<meta name="description" content="excelkospi 텍스트 광고 제안서. 회사 PC에서 엑셀 보는 척 주식 보는 진성 직장인 트래픽에 광고를 노출하세요." />
<link rel="icon" href="/favicon.ico" sizes="any" />

<!-- ===================================================================
     ▼▼▼ 제안 단가 / 조건은 아래 한 곳만 수정하면 페이지 전체에 반영됩니다 ▼▼▼
     본문 문구는 같은 폴더의 ad.md 파일에서 수정하세요.
     =================================================================== -->
<script>
  window.AD_CONFIG = {
    priceKRW: 400000,        // 2주 런칭 테스트 금액 (숫자만)
    periodLabel: "2주",       // 게재 기간 표기
    cpcLow: 170,             // 예상 실질 클릭단가 하한
    cpcHigh: 230,            // 예상 실질 클릭단가 상한
    maxAdvertisers: 3,       // 동시 로테이션 최대 광고주 수
    vatNote: "VAT 별도 · 현금영수증 발행 가능",
    contactEmail: "excelkospi@outlook.com",
    siteUrl: "excelkospi.pages.dev",
    gaPeriod: "GA 5/22~5/29"
  };
</script>
<!-- ▲▲▲ 여기까지 ▲▲▲ -->

<style>
:root{
  --green:#107c41; --green-ink:#0c5d34; --green-soft:#eaf4ee; --green-line:#cfe6d8;
  --blue:#2563eb; --amber:#b7791f; --amber-soft:#fdf6e3;
  --ink:#17211c; --muted:#5d6d64; --faint:#7a887f;
  --line:#dce5df; --line-strong:#bccabf; --paper:#fff; --sheet:#fbfcfa; --page:#eef2ee;
  --shadow:0 8px 22px rgba(32,54,42,.08);
  font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic","Segoe UI",Roboto,Arial,sans-serif;
  color:var(--ink); background:var(--page);
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:var(--page);color:var(--ink);-webkit-font-smoothing:antialiased;word-break:keep-all;line-height:1.6}
a{color:var(--green-ink)}
h1,h2,h3,h4{letter-spacing:-.01em;line-height:1.3;margin:0}

.wrap{max-width:880px;margin:0 auto;padding:0 calc(16px + env(safe-area-inset-right,0px)) calc(80px + env(safe-area-inset-bottom,0px)) calc(16px + env(safe-area-inset-left,0px))}
.sheet{background:var(--paper);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:34px 38px;margin:18px 0}

.hero{background:var(--green);color:#fff;border-radius:14px;padding:52px 40px 36px;margin:18px 0;box-shadow:var(--shadow)}
.hero .eyebrow{font-size:13px;font-weight:700;letter-spacing:.04em;opacity:.86;margin:0 0 14px}
.hero h1{font-size:40px;font-weight:800;line-height:1.15}
.hero h1 .sub{display:block;font-size:24px;font-weight:700;margin-top:8px;opacity:.95}
.hero .tag{margin:22px 0 0;font-size:16px;opacity:.95}
.hero .meta{margin-top:26px;padding-top:18px;border-top:1px solid rgba(255,255,255,.28);display:flex;flex-wrap:wrap;gap:18px;font-size:14px}
.hero .meta a{color:#fff;text-decoration:underline}
.hero .meta b{font-weight:700}

.tag-h{display:inline-block;background:var(--green);color:#fff;font-weight:800;font-size:18px;padding:7px 16px;border-radius:7px;margin:0 0 16px}
.divider-h{text-align:center;padding:26px 0 6px}
.divider-h h2{font-size:30px;font-weight:800}
.divider-h .rule{width:160px;height:5px;background:var(--green);border-radius:3px;margin:14px auto 0}
.sec-title{font-size:24px;font-weight:800;margin:0 0 4px}
.sec-note{color:var(--muted);font-size:13px;margin:0 0 16px;font-weight:600}

ul.bul{margin:8px 0;padding:0;list-style:none}
ul.bul>li{position:relative;padding:0 0 0 18px;margin:0 0 11px;font-size:15.5px}
ul.bul>li::before{content:"";position:absolute;left:2px;top:11px;width:6px;height:6px;border-radius:50%;background:var(--green)}
ul.bul ul{margin:8px 0 4px;padding:0;list-style:none}
ul.bul ul>li{position:relative;padding-left:16px;margin:0 0 6px;font-size:14px;color:var(--muted)}
ul.bul ul>li::before{content:"";position:absolute;left:0;top:9px;width:5px;height:5px;border-radius:50%;background:var(--line-strong)}
.muted{color:var(--muted)}
p.para{font-size:15.5px;margin:12px 0}
.callout{background:var(--green-soft);border:1px solid var(--green-line);border-left:4px solid var(--green);border-radius:8px;padding:14px 16px;margin:16px 0;font-size:14.5px}
.callout b{color:var(--green-ink)}
.quote{border-left:4px solid var(--green);background:var(--sheet);padding:12px 16px;border-radius:0 8px 8px 0;margin:14px 0;font-size:14px}
.quote div{padding:3px 0}
.tnote{font-size:12px;color:var(--faint);margin:8px 0;line-height:1.55}
.tnote code,p.para code,td code{background:#eef3ef;border-radius:4px;padding:1px 5px;font-size:.92em}

.with-side{display:grid;grid-template-columns:92px 1fr;gap:16px;align-items:start;margin:0 0 26px}
.row-chip{display:inline-block;background:#6b7b71;color:#fff;font-weight:700;font-size:12px;padding:5px 13px;border-radius:7px;margin-top:4px}
.tbl-wrap{overflow-x:auto}
table{border-collapse:collapse;width:100%;font-size:13.5px}
th,td{padding:9px 10px;text-align:right;border-bottom:1px solid var(--line);white-space:nowrap}
th:first-child,td:first-child{text-align:left}
thead th{color:var(--muted);font-weight:700;font-size:12.5px;border-bottom:1.5px solid var(--line-strong)}
tbody tr:last-child td{border-bottom:1.5px solid var(--line-strong)}
tr.hi td{background:var(--amber-soft)}

figure.shot{margin:16px 0;border:1px solid var(--line);border-radius:10px;overflow:hidden;background:var(--sheet);position:relative}
figure.shot img{display:block;width:100%;height:auto}
figure.shot figcaption{font-size:12px;color:var(--muted);padding:9px 13px;border-top:1px solid var(--line);background:#fff}

/* image swap overlay (편집 모드에서만 표시) */
.swap{display:none}
body.img-edit .swap{display:flex;flex-wrap:wrap;align-items:center;gap:8px;position:absolute;left:8px;right:8px;top:8px;background:rgba(23,33,28,.86);backdrop-filter:blur(3px);border-radius:9px;padding:9px 11px;color:#fff;font-size:12px;z-index:5}
body.img-edit figure.shot{outline:2px dashed var(--green);outline-offset:-2px}
.swap .swap-path{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;background:rgba(255,255,255,.14);border-radius:5px;padding:3px 7px;font-size:11.5px;flex:1 1 200px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.swap .swap-btn{border:0;border-radius:6px;padding:6px 11px;font-size:11.5px;font-weight:750;cursor:pointer;background:#fff;color:var(--green-ink);white-space:nowrap}
.swap .swap-btn.ghost{background:rgba(255,255,255,.16);color:#fff}
.swap .swap-hint{flex:1 1 100%;font-size:10.5px;opacity:.78;line-height:1.5}
.btn.on{background:var(--green);color:#fff;border-color:var(--green)}

/* why cards */
.why{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:6px}
.why .card{border:1px solid var(--line);border-radius:12px;padding:18px;background:var(--sheet)}
.why .card .num{display:inline-grid;place-items:center;width:30px;height:30px;border-radius:8px;background:var(--green);color:#fff;font-weight:800;font-size:15px}
.why .card h3{font-size:16.5px;margin:12px 0 6px}
.why .card p{margin:0;font-size:13.5px;color:var(--muted)}
.why .card b{color:var(--green-ink);font-weight:800}

/* report dashboard */
.rpt{border:1px solid var(--line);border-radius:12px;background:var(--paper);overflow:hidden;box-shadow:0 5px 16px rgba(32,54,42,.05);margin:18px 0}
.rpt-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;padding:16px 18px 14px;border-bottom:1px solid var(--line);background:#fbfdfb}
.rpt-head h4{font-size:16.5px}
.rpt-live{display:inline-flex;align-items:center;gap:6px;color:var(--muted);font-size:11.5px;margin-top:5px;font-weight:600}
.rpt-live .dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 0 0 rgba(16,124,65,.5);animation:pulse 2s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(16,124,65,.45)}70%{box-shadow:0 0 0 7px rgba(16,124,65,0)}100%{box-shadow:0 0 0 0 rgba(16,124,65,0)}}
.rpt-pill{border:1px solid var(--line-strong);border-radius:7px;padding:7px 12px;font-size:12px;font-weight:750;color:var(--green-ink);background:#fff;white-space:nowrap;cursor:pointer}
.rpt-facts{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:7px;padding:12px 18px;border-bottom:1px solid var(--line)}
.rpt-fact{border:1px solid #e4ece6;border-radius:7px;background:#fbfdfb;padding:8px 10px}
.rpt-fact .k{font-size:11px;font-weight:750;color:var(--muted)}
.rpt-fact .v{margin-top:3px;font-size:12.5px;font-weight:750;color:#24332b;line-height:1.4}
.rpt-metrics{display:grid;grid-template-columns:repeat(3,1fr)}
.rpt-metrics .m{padding:14px 16px;border-bottom:1px solid var(--line);border-right:1px solid var(--line)}
.rpt-metrics .m .k{font-size:11.5px;color:var(--muted);font-weight:750;display:flex;align-items:center;gap:4px}
.rpt-metrics .m .k .q{display:inline-grid;place-items:center;width:15px;height:15px;border:1px solid var(--line-strong);border-radius:50%;font-size:10px;color:var(--green-ink);background:#fff}
.rpt-metrics .m .v{font-size:23px;font-weight:800;margin-top:4px;line-height:1.05}
.rpt-metrics .m .s{font-size:11px;color:var(--faint);margin-top:3px}
.rpt-metrics .m.amber{background:var(--amber-soft)}
.rpt-sec{padding:15px 18px;border-bottom:1px solid var(--line)}
.rpt-sec .lbl{font-weight:800;font-size:13.5px;margin-bottom:10px}
.rpt-sec .lbl span{font-weight:600;font-size:11.5px;color:var(--muted)}
.bar{height:7px;border-radius:4px;background:#e7eee9;overflow:hidden;min-width:60px}
.bar>i{display:block;height:100%;background:var(--green);border-radius:4px}
.rpt-note{font-size:11.5px;color:var(--faint);padding:12px 18px;line-height:1.55}

/* pricing */
.price-box{border:2px solid var(--green);border-radius:14px;background:var(--green-soft);padding:24px 26px;margin:6px 0 20px}
.price-box .label{font-size:14px;font-weight:700;color:var(--green-ink)}
.price-box .amount{font-size:40px;font-weight:800;color:var(--green-ink);line-height:1.1;margin:6px 0 4px}
.price-box .vat{font-size:13px;color:var(--muted)}
.price-box .cpc{margin-top:14px;padding-top:14px;border-top:1px dashed var(--green-line);font-size:14px}
.price-box .cpc b{color:var(--green-ink)}

.contact{background:var(--green);color:#fff;border-radius:14px;padding:40px;text-align:center;margin:18px 0}
.contact h2{font-size:28px;font-weight:800}
.contact p{margin:14px 0 0;font-size:16px;opacity:.95}
.contact a.em{display:inline-block;margin-top:18px;background:#fff;color:var(--green-ink);font-weight:800;font-size:16px;padding:12px 24px;border-radius:9px;text-decoration:none}
.contact .foot{opacity:.9;font-size:13px;margin-top:18px}

.toolbar{position:sticky;top:0;z-index:20;background:rgba(238,242,238,.92);backdrop-filter:blur(6px);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;padding:calc(10px + env(safe-area-inset-top,0px)) calc(16px + env(safe-area-inset-right,0px)) 10px calc(16px + env(safe-area-inset-left,0px))}
.toolbar .brand{display:flex;align-items:center;gap:9px;font-weight:800;font-size:15px;min-width:0}
.toolbar .mark{width:26px;height:26px;border-radius:6px;background:var(--green);color:#fff;display:grid;place-items:center;font-weight:800;font-size:13px}
.toolbar .sp{margin-left:auto}
.btn{border:1px solid var(--line-strong);background:#fff;color:var(--green-ink);border-radius:8px;padding:8px 14px;font-size:13px;font-weight:750;cursor:pointer}
.btn.primary{background:var(--green);color:#fff;border-color:var(--green)}
.loading{padding:60px 16px;text-align:center;color:var(--muted)}

/* 광고주 맞춤(링크 생성기) 주입 요소 */
.client-banner{display:flex;align-items:center;gap:14px;background:linear-gradient(105deg,var(--green),#0c5d34);color:#fff;border-radius:14px;padding:22px 26px;margin:18px 0;box-shadow:var(--shadow);-webkit-print-color-adjust:exact;print-color-adjust:exact}
.client-banner .cb-tag{flex:0 0 auto;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.34);border-radius:999px;padding:5px 13px;font-size:12px;font-weight:800;letter-spacing:.02em}
.client-banner .cb-title{font-size:21px;font-weight:800;line-height:1.3}
.client-banner .cb-title small{display:block;font-size:13px;font-weight:600;opacity:.9;margin-top:3px}
.client-memo{background:var(--amber-soft);border:1px solid #efe2bf;border-left:4px solid var(--amber);border-radius:11px;padding:18px 20px;margin:16px 0;-webkit-print-color-adjust:exact;print-color-adjust:exact}
.client-memo .cm-label{font-size:12px;font-weight:800;color:var(--amber);letter-spacing:.02em;margin-bottom:7px}
.client-memo .cm-body{font-size:15px;line-height:1.7;color:var(--ink);white-space:pre-wrap}

@media (max-width:680px){
  .sheet,.hero,.contact{padding:24px 20px}
  .hero h1{font-size:30px}.hero h1 .sub{font-size:19px}
  .why{grid-template-columns:1fr}
  .with-side{grid-template-columns:1fr;gap:8px}
  .rpt-metrics{grid-template-columns:1fr}
  .divider-h h2{font-size:24px}
}

@media print{
  :root{--page:#fff}
  @page{size:A4;margin:13mm 11mm}
  body{background:#fff}
  .toolbar,.no-print,.swap{display:none!important}
  body.img-edit figure.shot{outline:none}
  .wrap{max-width:none;padding:0}
  .sheet,.hero,.contact,.divider-h{box-shadow:none;margin:0 0 9mm;border-radius:0;page-break-inside:avoid}
  .hero,.contact{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .tag-h,.row-chip,.why .card .num,.bar>i,.rpt-pill,.divider-h .rule,.stat,tr.hi td,.rpt-metrics .m.amber,.rpt-live .dot,.price-box{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .why .card,.with-side,figure.shot,.rpt,.price-box,table{page-break-inside:avoid}
  .divider-h{page-break-before:always}
  .rpt-live .dot{animation:none}
  a{color:var(--green-ink)!important;text-decoration:none}
  .sec-title{page-break-after:avoid}
}
</style>
</head>
<body>

<div class="toolbar no-print">
  <div class="brand"><span class="mark">X</span><span>excelkospi 광고 제안서</span></div>
  <span class="sp"></span>
  <a class="btn" href="/ad-builder" style="text-decoration:none">광고주별 링크</a>
  <button class="btn" id="imgEditBtn">이미지 교체</button>
  <button class="btn" onclick="var p=document.getElementById('price');if(p)p.scrollIntoView()">제안 단가</button>
  <button class="btn primary" onclick="window.print()">인쇄 / PDF 저장</button>
</div>

<div class="wrap"><div id="content" class="loading">제안서를 불러오는 중…</div></div>

<script>
(function(){
  "use strict";
  var C = window.AD_CONFIG || {};

  // 광고주 맞춤 오버라이드: /ad?c=<base64url(JSON)> (백엔드 없음)
  function b64urlDecode(str){
    str = String(str).replace(/-/g,'+').replace(/_/g,'/');
    while(str.length % 4) str += '=';
    var bin = atob(str), bytes = new Uint8Array(bin.length);
    for(var i=0;i<bin.length;i++) bytes[i] = bin.charCodeAt(i);
    return JSON.parse(new TextDecoder().decode(bytes));
  }
  var CLIENT = null;
  try {
    var cp = new URLSearchParams(location.search).get('c');
    if (cp) CLIENT = b64urlDecode(cp);
  } catch(e){ CLIENT = null; }
  // 광고주 맞춤 링크(/ad?c=...)로 들어온 경우에만 실제 단가를 노출한다.
  // 그냥 /ad 로 공개 접근하면 가격·CPC 를 '협의'로 가려 외부 노출을 막는다.
  var isAdvertiserLink = !!(CLIENT && typeof CLIENT === 'object');
  if (isAdvertiserLink) {
    if (CLIENT.price   != null && CLIENT.price   !== '') C.priceKRW       = Number(CLIENT.price);
    if (CLIENT.period)                                   C.periodLabel    = CLIENT.period;
    if (CLIENT.cpcLow  != null && CLIENT.cpcLow  !== '') C.cpcLow         = Number(CLIENT.cpcLow);
    if (CLIENT.cpcHigh != null && CLIENT.cpcHigh !== '') C.cpcHigh        = Number(CLIENT.cpcHigh);
    if (CLIENT.maxAdv  != null && CLIENT.maxAdv  !== '') C.maxAdvertisers = Number(CLIENT.maxAdv);
    if (CLIENT.vat)                                      C.vatNote        = CLIENT.vat;
  }

  var won = function(n){ return Number(n).toLocaleString('ko-KR') + '원'; };
  var PRICE_MASK = '협의';
  var TOKENS = {
    '{{price}}': isAdvertiserLink ? won(C.priceKRW) : PRICE_MASK,
    '{{period}}': C.periodLabel,
    '{{cpc}}': isAdvertiserLink ? (C.cpcLow + '~' + C.cpcHigh + '원') : PRICE_MASK,
    '{{maxAdv}}': String(C.maxAdvertisers),
    '{{vat}}': C.vatNote,
    '{{email}}': C.contactEmail,
    '{{siteUrl}}': C.siteUrl,
    '{{gaPeriod}}': C.gaPeriod
  };
  function applyTokens(s){ return s.replace(/\{\{[a-zA-Z]+\}\}/g, function(m){ return (m in TOKENS) ? TOKENS[m] : m; }); }

  function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  // inline: escape, then markdown bold/link/code, then allow <br>
  function inline(s){
    s = esc(s);
    s = s.replace(/&lt;br\s*\/?&gt;/g,'<br>');
    s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
    s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    s = s.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g, function(_,t,u){
      var safe = /^(https?:|mailto:|\/|#)/.test(u) ? u : '#';
      return '<a href="'+safe+'">'+t+'</a>';
    });
    return s;
  }

  // ---- fence renderers ----
  function fields(lines){ // returns {single-keys, multi:{fact:[],metric:[],area:[],creative:[]}}
    var out = { multi:{fact:[],metric:[],area:[],creative:[]} };
    lines.forEach(function(ln){
      var m = ln.match(/^(\w+)(\*?):\s*(.*)$/);
      if(!m) return;
      var key=m[1], star=m[2], val=m[3];
      if(out.multi[key]){ out.multi[key].push({star:!!star, parts:val.split('|').map(function(x){return x.trim();})}); }
      else { out[key]=val; }
    });
    return out;
  }

  function renderHero(lines){
    var f = fields(lines);
    var meta = '<div class="meta">'
      + '<span><b>서비스</b> <a href="https://'+C.siteUrl+'">'+C.siteUrl+'</a></span>'
      + '<span><b>문의</b> <a href="mailto:'+C.contactEmail+'">'+C.contactEmail+'</a></span>'
      + '<span><b>집계</b> Google Analytics 5/22~5/29</span></div>';
    return '<header class="hero">'
      + '<p class="eyebrow">'+inline(f.eyebrow||'')+'</p>'
      + '<h1>'+inline(f.title||'')+'<span class="sub">'+inline(f.subtitle||'')+'</span></h1>'
      + '<p class="tag">'+inline(f.tagline||'')+'</p>'
      + meta + '</header>';
  }

  function renderCards(lines){
    var cards=[], cur=null;
    lines.forEach(function(ln){
      var h = ln.match(/^###\s+(.*)$/);
      if(h){ cur={title:h[1], body:[]}; cards.push(cur); }
      else if(cur && ln.trim()!=='') cur.body.push(ln.trim());
    });
    var html = cards.map(function(c){
      var num='', title=c.title;
      var nm = title.match(/^(\d+)\.\s*(.*)$/);
      if(nm){ num='<span class="num">'+nm[1]+'</span>'; title=nm[2]; }
      return '<div class="card">'+num+'<h3>'+inline(title)+'</h3><p>'+inline(c.body.join(' '))+'</p></div>';
    }).join('');
    return '<div class="why">'+html+'</div>';
  }

  function renderReport(lines){
    var f = fields(lines);
    var facts = f.multi.fact.map(function(x){
      return '<div class="rpt-fact"><div class="k">'+inline(x.parts[0])+'</div><div class="v">'+inline(x.parts[1]||'')+'</div></div>';
    }).join('');
    var metrics = f.multi.metric.map(function(x){
      return '<div class="m'+(x.star?' amber':'')+'"><div class="k">'+inline(x.parts[0])+' <span class="q">?</span></div>'
        +'<div class="v">'+inline(x.parts[1]||'')+'</div><div class="s">'+inline(x.parts[2]||'')+'</div></div>';
    }).join('');
    var areaRows = f.multi.area.map(function(x){
      var p=x.parts; // name|확인|원본|클릭|CTR|barpct
      return '<tr><td>'+inline(p[0])+'</td><td>'+p[1]+'</td><td>'+p[2]+'</td><td>'+p[3]+'</td><td>'+p[4]+'</td>'
        +'<td><div class="bar"><i style="width:'+(p[5]||0)+'%"></i></div></td></tr>';
    }).join('');
    var creativeRows = f.multi.creative.map(function(x){
      var p=x.parts; // text|원본|클릭|CTR
      return '<tr><td>'+inline(p[0])+'</td><td>'+p[1]+'</td><td>'+p[2]+'</td><td>'+p[3]+'</td></tr>';
    }).join('');
    return '<div class="rpt">'
      + '<div class="rpt-head"><div><h4>'+inline(f.title||'')+'</h4>'
        + '<div class="rpt-live"><span class="dot"></span>'+inline(f.updated||'')+'</div></div>'
        + '<span class="rpt-pill">리포트 링크 복사</span></div>'
      + (facts?'<div class="rpt-facts">'+facts+'</div>':'')
      + '<div class="rpt-metrics">'+metrics+'</div>'
      + (areaRows?'<div class="rpt-sec"><div class="lbl">영역별 성과 <span>· 확인된 노출 기준</span></div>'
          +'<div class="tbl-wrap"><table><thead><tr><th>영역</th><th>확인 노출</th><th>원본 기록</th><th>클릭</th><th>확인 CTR</th><th style="width:140px">비중</th></tr></thead><tbody>'+areaRows+'</tbody></table></div></div>':'')
      + (creativeRows?'<div class="rpt-sec"><div class="lbl">소재별 원본 기록 <span>· 소재 단위</span></div>'
          +'<div class="tbl-wrap"><table><thead><tr><th>소재</th><th>원본 기록</th><th>클릭</th><th>원본 CTR</th></tr></thead><tbody>'+creativeRows+'</tbody></table></div></div>':'')
      + (f.note?'<div class="rpt-note">'+inline(f.note)+'</div>':'')
      + '</div>';
  }

  function renderPrice(lines){
    var f = fields(lines);
    return '<div class="price-box" id="price">'
      + '<div class="label">'+inline(f.label||'')+'</div>'
      + '<div class="amount">'+inline(f.amount||'')+'</div>'
      + '<div class="vat">'+inline(f.vat||'')+'</div>'
      + (f.cpc?'<div class="cpc">'+inline(f.cpc)+'</div>':'')
      + '</div>';
  }

  function renderContact(lines){
    var f = fields(lines);
    return '<section class="contact"><h2>'+inline(f.title||'')+'</h2>'
      + '<p>'+inline(f.body||'')+'</p>'
      + (f.email?'<a class="em" href="mailto:'+f.email+'">'+f.email+'</a>':'')
      + (f.foot?'<p class="foot">'+inline(f.foot)+'</p>':'')+'</section>';
  }

  // ---- table ----
  function renderTable(rows, chip){
    var cells = rows.map(function(r){
      return r.replace(/^\|/,'').replace(/\|\s*$/,'').split('|').map(function(c){return c.trim();});
    });
    // drop separator row (index 1)
    var header = cells[0];
    var body = cells.slice(1).filter(function(r){ return !r.every(function(c){return /^:?-{2,}:?$/.test(c);}); });
    var thead = '<thead><tr>'+header.map(function(c){return '<th>'+inline(c)+'</th>';}).join('')+'</tr></thead>';
    var tbody = '<tbody>'+body.map(function(r){
      var hi=false;
      r = r.map(function(c,i){ if(i===0 && c.charAt(0)==='*'){ hi=true; return c.slice(1).trim(); } return c; });
      return '<tr'+(hi?' class="hi"':'')+'>'+r.map(function(c){return '<td>'+inline(c)+'</td>';}).join('')+'</tr>';
    }).join('')+'</tbody>';
    var tbl = '<div class="tbl-wrap"><table>'+thead+tbody+'</table></div>';
    if(chip) return '<div class="with-side"><div><span class="row-chip">'+esc(chip)+'</span></div><div>'+tbl+'</div></div>';
    return tbl;
  }

  // ---- main parser ----
  function render(md){
    md = applyTokens(md).replace(/<!--[\s\S]*?-->/g,'');
    var lines = md.split('\n');
    var html=[], i=0, sheetOpen=false, pendingChip=null;
    function openSheet(id){ if(!sheetOpen){ html.push('<section class="sheet"'+(id?' id="'+id+'"':'')+'>'); sheetOpen=true; } }
    function closeSheet(){ if(sheetOpen){ html.push('</section>'); sheetOpen=false; } }

    while(i < lines.length){
      var ln = lines[i];
      var t = ln.trim();

      if(t===''){ i++; continue; }

      // fences
      var fence = t.match(/^:::(\w+)\s*$/);
      if(fence){
        var name=fence[1], buf=[]; i++;
        while(i<lines.length && lines[i].trim()!==':::'){ buf.push(lines[i]); i++; }
        i++; // skip closing :::
        if(name==='hero'){ closeSheet(); html.push(renderHero(buf)); }
        else if(name==='contact'){ closeSheet(); html.push(renderContact(buf)); }
        else if(name==='cards'){ openSheet(); html.push(renderCards(buf)); }
        else if(name==='report'){ openSheet(); html.push(renderReport(buf)); }
        else if(name==='price'){ openSheet(); html.push(renderPrice(buf)); }
        continue;
      }

      // headings
      var h1=t.match(/^#\s+(.*)$/), h2=t.match(/^##\s+(.*)$/), h3=t.match(/^###\s+(.*)$/), h4=t.match(/^####\s+(.*)$/);
      if(h4){ openSheet(); html.push('<p class="sec-note">'+inline(h4[1])+'</p>'); i++; continue; }
      if(h3){ closeSheet(); openSheet(/제안 금액/.test(h3[1])?'price-sec':null); html.push('<h3 class="sec-title">'+inline(h3[1])+'</h3>'); i++; continue; }
      if(h2){ closeSheet(); openSheet(); html.push('<span class="tag-h">'+inline(h2[1])+'</span>'); i++; continue; }
      if(h1){ closeSheet(); html.push('<div class="divider-h"><h2>'+inline(h1[1])+'</h2><div class="rule"></div></div>'); i++; continue; }

      // chip label (pairs with following table)
      var chip=t.match(/^@chip\s+(.*)$/);
      if(chip){ pendingChip=chip[1]; i++; continue; }

      // image
      var img=t.match(/^!\[([^\]]*)\]\(([^)\s]+)\)\s*$/);
      if(img){ openSheet();
        var src=/^(https?:|\/)/.test(img[2])?img[2]:'#';
        html.push('<figure class="shot" data-src="'+esc(src)+'"><img src="'+esc(src)+'" alt="'+esc(img[1])+'" loading="lazy" />'
          +(img[1]?'<figcaption>'+esc(img[1])+'</figcaption>':'')+'</figure>');
        i++; continue;
      }

      // table
      if(t.indexOf('|')!==-1 && i+1<lines.length && /^\s*\|?[\s:-]*-{2,}[\s:|-]*$/.test(lines[i+1])){
        var trows=[]; while(i<lines.length && lines[i].indexOf('|')!==-1){ trows.push(lines[i].trim()); i++; }
        openSheet(); html.push(renderTable(trows, pendingChip)); pendingChip=null; continue;
      }

      // tnote
      if(t.charAt(0)==='※'){ openSheet(); html.push('<p class="tnote">'+inline(t.replace(/^※\s*/,''))+'</p>'); i++; continue; }

      // blockquote
      if(t.charAt(0)==='>'){
        var q=[]; while(i<lines.length && lines[i].trim().charAt(0)==='>'){ q.push(lines[i].trim().replace(/^>\s?/,'')); i++; }
        openSheet();
        if(q.length>1) html.push('<div class="quote">'+q.map(function(x){return '<div>'+inline(x)+'</div>';}).join('')+'</div>');
        else html.push('<div class="callout">'+inline(q[0])+'</div>');
        continue;
      }

      // list
      if(/^\s*-\s+/.test(ln)){
        var items=[]; while(i<lines.length && /^\s*-\s+/.test(lines[i])){
          var mm=lines[i].match(/^(\s*)-\s+(.*)$/); items.push({indent:mm[1].length, text:mm[2]}); i++;
        }
        openSheet(); html.push(buildList(items));
        continue;
      }

      // paragraph
      var para=[]; while(i<lines.length && lines[i].trim()!=='' && !isBlockStart(lines[i])){ para.push(lines[i].trim()); i++; }
      openSheet(); html.push('<p class="para">'+inline(para.join(' '))+'</p>');
    }
    closeSheet();
    return html.join('\n');
  }

  function isBlockStart(ln){
    var t=ln.trim();
    return /^#{1,4}\s/.test(t) || /^:::/.test(t) || /^@chip\s/.test(t) || /^!\[/.test(t)
      || /^>/.test(t) || t.charAt(0)==='※' || /^\s*-\s+/.test(ln) || (t.indexOf('|')!==-1);
  }

  function buildList(items){
    var out='<ul class="bul">', i=0;
    while(i<items.length){
      var it=items[i];
      if(it.indent>=2){ i++; continue; } // handled by sub below
      var sub=[]; var j=i+1;
      while(j<items.length && items[j].indent>=2){ sub.push(items[j]); j++; }
      out+='<li>'+inline(it.text);
      if(sub.length){ out+='<ul>'+sub.map(function(s){return '<li>'+inline(s.text)+'</li>';}).join('')+'</ul>'; }
      out+='</li>';
      i=j;
    }
    return out+'</ul>';
  }

  // ---- 이미지 교체(미리보기) ----
  function setupImageEdit(){
    document.querySelectorAll('figure.shot').forEach(function(fig){
      if(fig.querySelector('.swap')) return;
      var src = fig.getAttribute('data-src') || '';
      var bar = document.createElement('div');
      bar.className = 'swap';
      bar.innerHTML = '<span class="swap-path">'+esc(src)+'</span>'
        + '<button type="button" class="swap-btn">파일 선택</button>'
        + '<button type="button" class="swap-btn ghost copyp">경로 복사</button>'
        + '<button type="button" class="swap-btn ghost rev" hidden>원래대로</button>'
        + '<span class="swap-hint">선택한 이미지는 이 화면에서 미리보기만 됩니다. 실제 교체는 <b>'+esc(src)+'</b> 파일을 같은 이름으로 덮어쓰면 됩니다.</span>';
      fig.appendChild(bar);
      var img = fig.querySelector('img');
      var orig = img.getAttribute('src');
      var input = document.createElement('input');
      input.type='file'; input.accept='image/*'; input.style.display='none';
      fig.appendChild(input);
      bar.querySelector('.swap-btn').addEventListener('click', function(){ input.click(); });
      input.addEventListener('change', function(){
        var f = input.files && input.files[0]; if(!f) return;
        img.src = URL.createObjectURL(f);
        bar.querySelector('.rev').hidden = false;
      });
      bar.querySelector('.rev').addEventListener('click', function(){
        img.src = orig; input.value=''; this.hidden = true;
      });
      bar.querySelector('.copyp').addEventListener('click', function(){
        var btn=this;
        try{ navigator.clipboard.writeText(src); btn.textContent='복사됨 ✓'; setTimeout(function(){btn.textContent='경로 복사';},1500); }catch(e){}
      });
    });
    var tb = document.getElementById('imgEditBtn');
    if(tb) tb.addEventListener('click', function(){
      var on = document.body.classList.toggle('img-edit');
      tb.classList.toggle('on', on);
      if(on){ var f=document.querySelector('figure.shot'); if(f) f.scrollIntoView({behavior:'smooth',block:'center'}); }
    });
  }

  function injectClient(cfg){
    var content = document.getElementById('content');
    if(!content) return;
    var name = (cfg.name||'').trim();
    var greeting = (cfg.greeting||'').trim();
    var memo = (cfg.memo||'').trim();
    if(name || greeting){
      var banner = document.createElement('div');
      banner.className = 'client-banner';
      var title = greeting || (name + '님께 드리는 광고 제안');
      var sub = (greeting && name) ? '<small>'+esc(name)+'</small>' : '';
      banner.innerHTML = '<span class="cb-tag">맞춤 제안</span><div class="cb-title">'+esc(title)+sub+'</div>';
      content.insertBefore(banner, content.firstChild);
    }
    if(memo){
      var box = document.createElement('div');
      box.className = 'client-memo';
      box.innerHTML = '<div class="cm-label">담당자 메모</div><div class="cm-body">'+esc(memo)+'</div>';
      var hero = content.querySelector('.hero');
      if(hero && hero.parentNode){ hero.parentNode.insertBefore(box, hero.nextSibling); }
      else { content.insertBefore(box, content.firstChild); }
    }
    if(name){ try{ document.title = name + ' · ' + document.title; }catch(e){} }
  }

  fetch('/ad.md', {cache:'no-cache'}).then(function(r){
    if(!r.ok) throw new Error('HTTP '+r.status);
    return r.text();
  }).then(function(md){
    document.getElementById('content').className='';
    document.getElementById('content').innerHTML = render(md);
    if(CLIENT) injectClient(CLIENT);
    document.querySelectorAll('.rpt-pill').forEach(function(b){
      b.addEventListener('click', function(){
        try{ navigator.clipboard.writeText(location.origin+'/advertiser'); b.textContent='복사됨 ✓'; setTimeout(function(){b.textContent='리포트 링크 복사';},1500); }catch(e){}
      });
    });
    setupImageEdit();
  }).catch(function(e){
    document.getElementById('content').innerHTML='<div class="loading">제안서를 불러오지 못했습니다. (ad.md: '+esc(String(e.message||e))+')</div>';
  });
})();
</script>
