<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex">
<title>공지사항 · 패치 노트</title>
<link rel="icon" href="/favicon.ico?v=20260530-665">
<link rel="stylesheet" href="/assets/app.css?v=20260531-670">
<style>
  body{margin:0;background:#eef1ee;color:#252423;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Apple SD Gothic Neo","Malgun Gothic",sans-serif}
  .patch-page{max-width:860px;margin:0 auto;padding:calc(64px + env(safe-area-inset-top,0px)) calc(16px + env(safe-area-inset-right,0px)) calc(40px + env(safe-area-inset-bottom,0px)) calc(16px + env(safe-area-inset-left,0px))}
  .patch-page-head{padding:0 2px 14px}
  .patch-page-head h1{font-size:20px;margin:0;color:#185c37}
  .patch-page .updates-body{border:1px solid #d8e3dc;border-radius:8px;max-height:none;font-size:13px}
  /* iOS Liquid Glass 스타일 뒤로 가기 — 스크롤해도 고정, 노치/홈바 safe-area 대응 */
  .lg-back{position:fixed;top:calc(env(safe-area-inset-top,0px) + 12px);left:calc(env(safe-area-inset-left,0px) + 12px);z-index:50;display:inline-flex;align-items:center;gap:4px;height:38px;padding:0 16px 0 11px;border-radius:999px;font:inherit;font-size:14px;font-weight:650;color:#143d27;text-decoration:none;background:rgba(255,255,255,.6);-webkit-backdrop-filter:blur(18px) saturate(180%);backdrop-filter:blur(18px) saturate(180%);border:1px solid rgba(255,255,255,.7);box-shadow:0 6px 20px rgba(0,0,0,.12),inset 0 1px 0 rgba(255,255,255,.85);transition:transform .14s ease,background .14s ease}
  .lg-back:hover{background:rgba(255,255,255,.8)}
  .lg-back:active{transform:scale(.95)}
  .lg-back .chev{font-size:18px;line-height:1;margin-top:-2px}
</style>
</head>
<body>
  <a class="lg-back" href="/" aria-label="앱으로 돌아가기"><span class="chev" aria-hidden="true">‹</span>뒤로</a>
  <div class="patch-page">
    <div class="patch-page-head">
      <h1>공지사항 · 패치 노트</h1>
    </div>
    <div class="updates-body" id="patchBody">불러오는 중...</div>
  </div>
  <script src="/assets/app-utils.js?v=20260531-668"></script>
  <script>
    (async function(){
      const body=document.getElementById('patchBody');
      try{
        const res=await fetch('/patch-notes.md?v=20260530-004', {cache:'no-store'});
        if(!res.ok) throw new Error('patch-notes ' + res.status);
        body.innerHTML=renderPatchMarkdown(await res.text());
      }catch{
        body.innerHTML='<p class="updates-error">공지사항을 불러오지 못했습니다.</p>';
      }
    })();
  </script>
</body>
</html>
