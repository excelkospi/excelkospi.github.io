<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <title>excelkospi 프로필</title>
  <meta name="robots" content="noindex,nofollow" />
  <meta name="theme-color" content="#185c37" />
  <meta name="build-id" content="20260616-2752" />
  <link rel="icon" href="/favicon.ico?v=20260615-2717" sizes="any" />
  <link rel="stylesheet" href="/assets/app.css.20260616-2752.css" />
</head>
<body class="auth-page excel-theme-classic">
  <div class="auth-liquid-bg bg-grid" aria-hidden="true">
    <div class="auth-bg-layer auth-bg-base"></div>
    <div class="auth-bg-layer auth-bg-sheet"></div>
    <div class="auth-bg-layer auth-bg-lines"></div>
    <div class="auth-bg-layer auth-bg-glow"></div>
  </div>
  <main class="auth-glass-shell">
    <section class="auth-glass-card" aria-labelledby="profilePageTitle" style="--mx:50%;--my:-10%">
      <div class="auth-glass-refract" aria-hidden="true"></div>
      <div class="auth-glass-rim" aria-hidden="true"></div>
      <div class="auth-glass-head auth-brand">
        <img class="auth-brand-logo" src="/assets/excelkospi-logo.webp?v=20260615-2717" alt="" width="58" height="58" />
        <h1 id="profilePageTitle">회원 정보</h1>
        <p>아이디와 닉네임, 비밀번호, 복구코드를 관리합니다.</p>
        <a class="auth-glass-back" href="/login">← 계정으로</a>
      </div>
      <div class="settings-auth" data-auth-panel="profile"></div>
    </section>
  </main>
  <svg width="0" height="0" style="position:absolute;pointer-events:none" aria-hidden="true">
    <filter id="authGlassDistort" x="-12%" y="-12%" width="124%" height="124%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.009 0.012" numOctaves="2" seed="14" result="noise" />
      <feGaussianBlur in="noise" stdDeviation="1.5" result="soft" />
      <feDisplacementMap in="SourceGraphic" in2="soft" scale="72" xChannelSelector="R" yChannelSelector="G" />
    </filter>
    <filter id="authGlassRim" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.006 0.009" numOctaves="2" seed="9" result="noise" />
      <feGaussianBlur in="noise" stdDeviation="2" result="soft" />
      <feDisplacementMap in="SourceGraphic" in2="soft" scale="118" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </svg>
  <script src="/assets/app-config.js?v=20260616-2751"></script>
  <script src="/assets/app-utils.js?v=20260615-2717" defer></script>
  <script src="/assets/app-auth.js?v=20260616-2740" defer></script>
</body>
</html>
