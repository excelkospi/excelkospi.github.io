<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>엑셀코스피 시스템 상태</title>
  <meta name="description" content="엑셀코스피 공개 서비스의 응답 상태와 지연 시간을 확인합니다." />
  <meta name="theme-color" content="#f5f5f7" />
  <link rel="icon" href="/favicon.ico?v=20260703-3240" sizes="any" />
  <link rel="stylesheet" href="/assets/status.css?v=20260703-3240" />
</head>
<body>
  <header class="status-topbar">
    <nav class="status-nav" aria-label="상태 페이지">
      <a class="status-brand" href="/">excelkospi</a>
      <span class="status-nav-title">시스템 상태</span>
      <a class="status-back" href="/">서비스로 돌아가기</a>
    </nav>
  </header>
  <main class="status-page">
    <section class="status-hero" aria-labelledby="statusTitle">
      <h1 id="statusTitle">시스템 상태</h1>
      <p id="statusSummary">공개 서비스 응답을 확인하고 있습니다.</p>
    </section>
    <section class="status-overview" aria-live="polite">
      <div class="status-overview-main">
        <div class="status-overview-line" id="statusOverall">
          <span class="status-dot is-loading" aria-hidden="true"></span>
          <strong>확인 중</strong>
        </div>
      </div>
      <div class="status-time" id="statusCheckedAt">최근 확인: -</div>
    </section>
    <button class="status-details-toggle" id="statusDetailsToggle" type="button" aria-controls="statusDetails" aria-expanded="true">
      <span id="statusServicesTitle">서비스</span>
      <span class="status-details-caret" aria-hidden="true">▾</span>
    </button>
    <section class="status-list-wrap" id="statusDetails" aria-labelledby="statusServicesTitle">
      <div class="status-groups" id="statusServices"></div>
    </section>
    <section class="status-note" aria-label="안내">
      <p>여기 나열되어 있지 않은 문제가 있으면 운영게시판으로 알려주세요. 이 페이지에는 공개 서비스의 읽기 전용 상태만 표시됩니다.</p>
      <p>글쓰기·계좌 생성처럼 사용자별 상태가 필요한 기능은 공개 점검 항목에 포함하지 않습니다.</p>
    </section>
  </main>
  <script src="/assets/status.js?v=20260703-3240" defer></script>
</body>
</html>
